name: Build EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout do Repositorio
      uses: actions/checkout@v4
      
    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar Bibliotecas Direto
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter==5.2.2 pandas==2.2.0 pyinstaller==6.3.0 openpyxl==3.1.2
        
    - name: Compilar o EXE
      run: |
        pyinstaller --noconfirm --onefile --windowed --collect-all customtkinter --hidden-import openpyxl --name "BuscadorPropostas" "app.py"
        
    - name: Salvar o Executavel
      uses: actions/upload-artifact@v4
      with:
        name: BuscadorPropostas-Windows
        path: dist/BuscadorPropostas.exe
